name: Publish @wyella/jwt-verify

# OIDC form (DEC-914b). No stored secret — npm authenticates via the
# GitHub OIDC token granted per-workflow-run, matched against the
# Trusted Publisher configured on npmjs.com for this repo + workflow.
#
# Trusted Publisher config (set by James in DEC-914b manual step):
#   org:      wyella
#   repo:     jwt-verify
#   workflow: publish.yml
#
# Trigger: push tag v* (e.g. v0.1.1).

on:
  push:
    tags: ['v*']
  workflow_dispatch: {}

permissions:
  id-token: write    # OIDC token exchange + provenance attestation signing
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # Node 24 bundles npm 11 — satisfies trap 3 (OIDC requires npm >=
      # 11.5.1) without an npm self-upgrade step. Node 22's npm 10 → 11
      # self-upgrade is broken mid-reify (MODULE_NOT_FOUND promise-retry)
      # regardless of whether we pin @11 or use @latest; dodging it by
      # picking a Node that already ships npm 11.
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      - run: npm --version

      - run: npm ci
      - run: npm run build
      - run: npm test

      # Trap 4: --provenance flag explicit. No NODE_AUTH_TOKEN env —
      # Trusted Publisher + id-token:write provides auth via OIDC.
      - name: Publish to npm (OIDC / Trusted Publishing)
        run: npm publish --access=public --provenance
