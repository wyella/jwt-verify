name: Publish @wyella/jwt-verify

# OIDC form (DEC-914b). No stored secret — npm authenticates via the
# GitHub OIDC token granted per-workflow-run, matched against the
# Trusted Publisher configured on npmjs.com for this repo + workflow.
#
# Trusted Publisher config (set by James in DEC-914b manual step):
#   org:      wyella
#   repo:     jwt-verify
#   workflow: publish.yml
#
# Trigger: push tag v* (e.g. v0.1.1).

on:
  push:
    tags: ['v*']
  workflow_dispatch: {}

permissions:
  id-token: write    # OIDC token exchange + provenance attestation signing
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      # Part 11 trap 3: OIDC publish requires npm >= 11.5.1. Node 22
      # ships npm 10.x. Pin to npm@11 rather than @latest to avoid the
      # self-upgrade bug that hit DEC-914a's first attempt (MODULE_NOT_FOUND
      # promise-retry mid-reify). The pinned install is a clean replace.
      - name: Upgrade npm to 11.x (OIDC requirement)
        run: npm install -g npm@11

      - run: npm --version

      - run: npm ci
      - run: npm run build
      - run: npm test

      # Trap 4: --provenance flag explicit. No NODE_AUTH_TOKEN env —
      # Trusted Publisher + id-token:write provides auth via OIDC.
      - name: Publish to npm (OIDC / Trusted Publishing)
        run: npm publish --access=public --provenance
